<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SaludYa - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- ICONOS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div class="container">

        <div class="card">

            <!-- LOGO -->
            <div class="logo">

                <i class="fa-solid fa-stethoscope"></i>

            </div>

            <!-- TITULO -->
            <h1>Bienvenido</h1>

            <p class="subtitle">
                SaludYa
            </p>

            <!-- FORMULARIO -->
            <form action="dashboard.html">

                <!-- EMAIL -->
                <label>
                    Correo electrónico
                </label>

                <div class="input-group">

                    <i class="fa-regular fa-envelope"></i>

                    <input 
                        type="email"
                        placeholder="correo@ejemplo.com"
                        required
                    >

                </div>

                <!-- PASSWORD -->
                <label>
                    Contraseña
                </label>

                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input 
                        type="password"
                        placeholder="Contraseña"
                        required
                    >

                    <i class="fa-solid fa-eye-slash"></i>

                </div>

                <!-- OPCIONES -->
                <div class="options">

                    <div class="remember">

                        <input type="checkbox">

                        <span>Recuérdame</span>

                    </div>

                    <a href="forgot-password.html">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <!-- BOTON -->
                <button type="submit">

                    Iniciar sesión

                </button>

            </form>

            <!-- REGISTRO -->
            <p class="register">

                ¿No tienes cuenta?

                <a href="register.html">
                    Regístrate aquí
                </a>

            </p>

        </div>

    </div>

</body>

</html>
