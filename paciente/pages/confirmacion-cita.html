<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaludYa - Confirmación de cita</title>
  <link rel="stylesheet" href="../css/confirmacion.css">
</head>
<body>
  <div class="card">
    <div class="card__icon">
      <i data-lucide="stethoscope"></i>
    </div>
    <h1 class="card__title">Confirmación de cita</h1>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Especialidad</label>
        <div class="select-wrapper">
          <select id="val-especialidad" class="form-select" disabled>
            <option selected>—</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Médico</label>
        <div class="select-wrapper">
          <select id="val-medico" class="form-select" disabled>
            <option selected>—</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Fecha</label>
        <div class="select-wrapper">
          <select id="val-fecha" class="form-select" disabled>
            <option selected>—</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Hora</label>
        <div class="select-wrapper">
          <select id="val-hora" class="form-select" disabled>
            <option selected>—</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>
    </div>

    <div class="confirmation-box">
      <p class="confirmation-text" id="conf-text"></p>
    </div>

    <a href="../index.html">
      <button class="btn-primary">Volver al panel</button>
    </a>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();

    const cita = JSON.parse(sessionStorage.getItem('saludya_cita_pendiente') || 'null');
    if (cita) {
      const [y, m, d] = cita.fecha.split('-');
      const fechaFmt  = `${d}/${m}/${y}`;

      document.querySelector('#val-especialidad option').textContent = cita.especialidad;
      document.querySelector('#val-medico option').textContent       = cita.medico;
      document.querySelector('#val-fecha option').textContent        = fechaFmt;
      document.querySelector('#val-hora option').textContent         = cita.hora;

      document.getElementById('conf-text').innerHTML =
        `Su cita ha sido agendada para el día <strong>${fechaFmt}</strong> a las <strong>${cita.hora}</strong>
         en la especialidad de <strong>${cita.especialidad}</strong> con el profesional <strong>${cita.medico}</strong>.
         Recuerde asistir con una antelación de 15 min o, si no puede asistir, cancele su cita con 12 horas de antelación.`;
    }
  </script>
</body>
</html>
