<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaludYa - Confirmación de cita</title>
  <link rel="stylesheet" href="../css/confirmacion.css">
</head>
<body>
  <div class="card">
    <div class="card__icon">
      <i data-lucide="stethoscope"></i>
    </div>
    <h1 class="card__title">Confirmación de cita</h1>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="especialidad">Especialidad</label>
        <div class="select-wrapper">
          <select id="especialidad" class="form-select" disabled>
            <option selected>Medicina general</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="medico">Médico</label>
        <div class="select-wrapper">
          <select id="medico" class="form-select" disabled>
            <option selected>Paula Garcia</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="fecha">Fecha</label>
        <div class="select-wrapper">
          <select id="fecha" class="form-select" disabled>
            <option selected>01/06/2026</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="hora">Hora</label>
        <div class="select-wrapper">
          <select id="hora" class="form-select" disabled>
            <option selected>10:30 am - 10:50am</option>
          </select>
          <i data-lucide="chevron-down" class="select-arrow"></i>
        </div>
      </div>
    </div>

    <div class="confirmation-box">
      <p class="confirmation-text">
        Su cita ha sido agendada para el día <strong>01/06/2026</strong> a las <strong>10:30am</strong>
        en la especialidad de <strong>Medicina General</strong> con el profesional <strong>Paula Garcia</strong>.
        Recuerde asistir con una antelación de 15 min o, si no puede asistir, cancele su cita con 12 horas de antelación.
      </p>
    </div>

    <a href="../index.html">
      <button class="btn-primary">Volver al panel</button>
    </a>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
